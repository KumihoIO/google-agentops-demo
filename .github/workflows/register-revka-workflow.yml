name: Register Revka Workflow

on:
  workflow_dispatch:
    inputs:
      workflow_path:
        description: "Workflow YAML file to register"
        default: ".revka/workflows/github-issue-resolver.yaml"
        required: true

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Register workflow in Revka
        env:
          REVKA_BEARER_TOKEN: ${{ secrets.REVKA_BEARER_TOKEN }}
          REVKA_GATEWAY_URL: ${{ secrets.REVKA_GATEWAY_URL }}
          WORKFLOW_PATH: ${{ inputs.workflow_path }}
        run: |
          : "${REVKA_BEARER_TOKEN:?Set the REVKA_BEARER_TOKEN repository secret}"
          : "${REVKA_GATEWAY_URL:?Set the REVKA_GATEWAY_URL repository secret}"
          python scripts/register_revka_workflow.py "${WORKFLOW_PATH}"

